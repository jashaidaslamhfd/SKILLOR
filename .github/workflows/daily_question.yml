name: "SKILLOR - Daily Engagement Question (US)"

on:
  workflow_dispatch:
  schedule:
    # ~21:00 New York, right after the evening Short (publishAt 20:00).
    # Two crons cover EST/EDT; the state file in data/daily_question_state.json
    # makes the second one a no-op, so this posts exactly ONCE per day.
    - cron: "0 1 * * *"   # 21:00 NY summer (EDT)
    - cron: "0 2 * * *"   # 21:00 NY winter (EST)

permissions:
  contents: write

concurrency:
  group: skillor-daily-question
  cancel-in-progress: false

jobs:
  post-question:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet requests google-api-python-client google-auth

      - name: Post today's question (YouTube comment + Facebook post)
        env:
          CHANNEL_LANGUAGE: "en-US"
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FB_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN || secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID || secrets.FB_PAGE_ID }}
          FB_API_VERSION: "v23.0"
          VIDEO_HISTORY_PATH: data/video_history.json
        run: python scripts/post_daily_question.py

      - name: Persist question state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- data/daily_question_state.json)" ]; then
            echo "No state change."; exit 0
          fi
          git config user.name "skillor-bot"
          git config user.email "skillor-bot@users.noreply.github.com"
          git add data/daily_question_state.json
          git commit -m "chore: daily question state [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then break
            else echo "Push retry $i"; sleep $((i*5)); [ $i -eq 3 ] && exit 0; fi
          done

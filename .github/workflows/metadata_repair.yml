name: "Metadata Repair (one-shot)"

# Repairs titles/tags/descriptions of videos published before the content
# fixes, using data/video_history.json + full channel discovery as ground
# truth. Default = DRY RUN.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true = write changes to YouTube; false = dry-run preview"
        required: true
        default: false
        type: boolean
      limit:
        description: "Max videos to process (0 = all channel uploads)"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Repair YouTube metadata
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          ARGS="--limit ${{ github.event.inputs.limit || '0' }}"
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then ARGS="$ARGS --apply"; fi
          python scripts/metadata_repair.py $ARGS
      - name: Upload repair report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metadata-repair-report
          path: output/metadata_repair_report.txt

name: MrNextep Auto Shorts
on:
  schedule:
    - cron: '0 8,12,15 *' # PKT 8PM, 12AM, 3AM = USA 11AM, 3PM, 6PM EST
  workflow_dispatch: # Manual Run button ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
          YOUTUBE_JSON_KEY: ${{ secrets.YOUTUBE_JSON_KEY }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: python src/main.py

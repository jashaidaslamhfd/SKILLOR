name: Auto Post YouTube Shorts

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at 12:00 UTC
  workflow_dispatch:      # Manual trigger

# FIX: Add permissions for better logging
permissions:
  contents: read
  actions: write
  checks: write

jobs:
  create-and-post:
    runs-on: ubuntu-latest
    
    # FIX: Add timeout to prevent infinite runs
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      # ============================================================
      # FIX: Cache YouTube Token - WITHOUT run_id in key
      # ============================================================
      - name: Cache YouTube Token
        id: youtube-cache
        uses: actions/cache@v3
        with:
          path: token_cache.json
          # FIX: Use stable key without run_id
          key: youtube-token-${{ runner.os }}-v1
          # FIX: Restore from any previous version
          restore-keys: |
            youtube-token-${{ runner.os }}-v
      
      - name: Display cache status
        run: |
          if [ -f token_cache.json ]; then
            echo "✅ YouTube token cache restored"
            echo "Token age: $(($(date +%s) - $(stat -c %Y token_cache.json))) seconds"
          else
            echo "⏳ No cached token found, will create new one"
          fi
      
      # ============================================================
      # Run the automation
      # ============================================================
      - name: Run YouTube Automation
        id: automation
        env:
          # YouTube OAuth
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          
          # Other APIs
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          
          # Facebook
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          
          # Instagram
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          
          # Cloudinary
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          
        run: |
          python main.py 2>&1 | tee output.log
      
      # ============================================================
      # FIX: Upload outputs for monitoring
      # ============================================================
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs-${{ github.run_id }}
          path: output.log
          retention-days: 7
      
      - name: Upload token cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-cache-${{ github.run_id }}
          path: token_cache.json
          retention-days: 7
      
      - name: Upload video
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video-${{ github.run_id }}
          path: output/latest_video.mp4
          retention-days: 7
      
      # ============================================================
      # FIX: Failure Notifications
      # ============================================================
      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ YouTube Automation Failed!"
          echo "Run: ${{ github.run_id }}"
          echo "Time: $(date)"
          echo "Check logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # FIX: Send email notification (if configured)
          # or use webhook (Slack/Discord)
          
      # FIX: Success notification
      - name: Send success notification
        if: success()
        run: |
          echo "✅ YouTube Automation Completed Successfully!"
          echo "Run: ${{ github.run_id }}"
          echo "Video uploaded to YouTube Shorts"

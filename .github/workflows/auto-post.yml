name: YouTube Automation System

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of videos to generate'
        required: false
        default: '1'
        type: string
      topic:
        description: 'Specific topic (optional)'
        required: false
        type: string
      skip_upload:
        description: 'Skip upload to platforms'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  actions: write
  checks: write

env:
  PYTHONUNBUFFERED: '1'
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  automation:
    name: Run YouTube Automation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Create directories
        run: |
          mkdir -p state output logs output/audio output/footage output/videos output/thumbnails

      - name: Cache YouTube Token
        id: youtube-cache
        uses: actions/cache@v4
        with:
          path: token_cache.json
          key: youtube-token-${{ runner.os }}-v1
          restore-keys: |
            youtube-token-${{ runner.os }}-

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore state cache
        id: state-cache
        uses: actions/cache@v4
        with:
          path: state/
          key: skillor-state-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            skillor-state-${{ runner.os }}-${{ steps.date.outputs.date }}
            skillor-state-${{ runner.os }}-

      - name: Run YouTube Automation
        id: automation
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          ARGS=("--count" "${{ github.event.inputs.count || '1' }}")
          TOPIC="${{ github.event.inputs.topic || '' }}"
          if [ -n "$TOPIC" ]; then
            ARGS+=("--topic" "$TOPIC")
          fi
          SKIP_UPLOAD="${{ github.event.inputs.skip_upload || 'false' }}"
          if [ "$SKIP_UPLOAD" = "true" ]; then
            ARGS+=("--skip-upload")
          fi
          python main.py "${ARGS[@]}"

      - name: Save state cache
        if: always()
        run: |
          if [ -d state ] && [ "$(ls -A state 2>/dev/null)" ]; then
            ls -la state/
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs-${{ github.run_id }}
          path: logs/

      - name: Notify Discord
        if: always() && secrets.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "🎬 YouTube Automation"
          description: "Run: #${{ github.run_number }} | Status: ${{ job.status }}"
          color: ${{ job.status == 'success' && '0x00FF00' || '0xFF0000' }}

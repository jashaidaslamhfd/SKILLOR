name: Auto Post Videos

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 18 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

# FIX: needed so the "Persist dedup state" step below is allowed to push a
# commit back to this repo using the default GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  create-and-post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg libgl1 fonts-dejavu

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python main.py

      # FIX: state/used_topics.txt and state/used_clips.txt used to live
      # under output/, which a fresh `actions/checkout` wipes at the start
      # of every run — so "don't repeat this topic/clip" never actually
      # worked across runs, only within a single video. This step commits
      # the small state/ text files back to the repo after every run so the
      # dedup history actually survives. It never touches the generated
      # video/audio/thumbnail files in output/ (see .gitignore).
      - name: Persist dedup state
        if: always()
        run: |
          git config user.name "skillor-bot"
          git config user.email "skillor-bot@users.noreply.github.com"
          git add state/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update dedup state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi

      # FIX: Artifact upload disabled — GitHub's free artifact storage quota
      # was hit, causing this step to fail (shown as a red X) even though
      # the actual video generation + uploads succeeded. Videos already go
      # to YouTube/Facebook/Instagram directly, so a GitHub backup copy
      # isn't required. Re-enable below if you want backups and have quota.
      # - name: Upload output as artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: generated-videos-${{ github.run_id }}-${{ github.run_attempt }}
      #     path: |
      #       output/*.mp4
      #       output/*.jpg
      #       output/*.png
      #       output/audio/*.mp3
      #     retention-days: 1
      #     if-no-files-found: warn

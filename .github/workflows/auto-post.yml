name: 🎬 USA Peak-Time YouTube Automation Pipeline (2026)

on:
  schedule:
    # 1. Video 1: 11:30 AM EST (4:30 PM UTC) - Morning Catch & Lunch Break
    - cron: '30 16 * * *'
    
    # 2. Video 2: 04:30 PM EST (9:30 PM UTC) - Post-Work / School Commute Peak
    - cron: '30 21 * * *'
    
    # 3. Video 3: 09:30 PM EST (02:30 AM UTC Next Day) - Late Night Bedtime Scrolling
    - cron: '30 2 * * *'
    
  # Emergency manual trigger from GitHub UI if needed
  workflow_dispatch:

jobs:
  automate_shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 45 # Heavy audio rendering and local models safety buffer

    steps:
      - name: 📥 Checkout System Repository Codes
        uses: actions/checkout@v4

      - name: 🐍 Initialize Python Execution Node (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up installations over daily multi-runs

      - name: 🎛️ Install Native Core System Binaries (FFmpeg + Espeak)
        run: |
          sudo apt update
          sudo apt install -y ffmpeg espeak-ng libxml2-dev libxslt-dev

      - name: 📦 Build Deep Dependency Cache & Modules Lock
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Yeh check karega ki agar requirements.txt directly root par nahi hai toh sub-folders dhoondhe
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else
            find . -name "requirements.txt" -exec pip install -r {} \;
          fi

      - name: 🔍 Perform Pre-Flight Systemic Health Check Verification
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          # Pehle check karega ki main.py kahan hai, phir us folder se run karega
          MAIN_PATH=$(find . -name "main.py" | head -n 1)
          if [ -z "$MAIN_PATH" ]; then
            echo "❌ CRITICAL ERROR: main.py file poore project me kahin nahi mili!"
            exit 1
          fi
          cd $(dirname "$MAIN_PATH")
          python main.py --health-check

      - name: 🚀 Run Content Creation & Upload Pipeline
        env:
          # Injecting Secure Variables Maps from Repository Secrets
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          
          # YouTube OAuth Client Injections (Raw Encrypted Content Mapping)
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          
          # Facebook/Instagram Graph API Access Tokens Meta Rings
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          # Dynamic Path Resolution: Yeh automatically main.py ka folder dhoondh kar uske andar enter hoga
          MAIN_PATH=$(find . -name "main.py" | head -n 1)
          cd $(dirname "$MAIN_PATH")
          
          # Run final single script pipeline automation
          python main.py --count 1

      - name: 🛡️ Safely Commit & Persist System State Registry Updates
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Automation Core"
          
          # state.json dhoondh kar git status me append karega
          STATE_PATH=$(find . -name "state.json" | head -n 1)
          if [ ! -z "$STATE_PATH" ]; then
            git add "$STATE_PATH"
            git commit -m "chore(telemetry): update state matrix registry logs [skip ci]" || true
            git push origin main || true
          fi

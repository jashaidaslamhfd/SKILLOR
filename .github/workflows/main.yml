name: "SKILLOR - YouTube Shorts Automation (US)"

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional video topic (empty = next Body Glitch episode)"
        required: false
        type: string
  schedule:
    # 3 videos/day for a US audience, auto-published at New York peaks
    # (06:00 / 12:30 / 20:00 America/New_York) via status.publishAt — the code
    # snaps each upload to the exact next NY slot, so the cron only needs to
    # start generation a bit before the slot. ONE cron per slot, year-round
    # (the winter/summer twin-cron system + delay-tolerant gate were removed
    # per owner request — publishAt already makes them unnecessary).
    - cron: "30 8 * * *"    # generation ~04:30 NY -> publish 06:00
    - cron: "0 15 * * *"    # generation ~11:00 NY -> publish 12:30
    - cron: "30 22 * * *"   # generation ~18:30 NY -> publish 20:00

permissions:
  contents: write

concurrency:
  group: skillor-video-generation
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache TTS model downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: skillor-tts-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-v3
          restore-keys: |
            skillor-tts-models-${{ runner.os }}-

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          # ffmpeg: video assembly · fonts-dejavu-core: PIL captions ·
          # espeak-ng: Kokoro phonemizer. (imagemagick removed — captions are
          # drawn with PIL now, nothing in the codebase reads IMAGEMAGICK_BINARY.)
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core espeak-ng
          python -m pip install --upgrade pip setuptools wheel
          for i in 1 2 3; do python -m pip install -r requirements.txt && break || { echo "retry $i"; sleep 15; }; done

      - name: Run offline quality regression tests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_body_glitch_topics.py
          python -m compileall -q src scripts tests
          python -m unittest discover -s tests -v

      - name: Validate required secrets (fail fast, before burning compute)
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          FB_UPLOAD_ENABLED: "true"
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FB_PAGE_ID_ALT: ${{ secrets.FB_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FB_ACCESS_TOKEN_ALT: ${{ secrets.FB_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          echo "Checking required secrets..."
          missing=0
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::GROQ_API_KEY missing. Add it in https://github.com/${{ github.repository }}/settings/secrets/actions"
            missing=1
          else
            echo "✓ GROQ_API_KEY present"
          fi
          # YouTube OAuth trio — without these the run used to fail in
          # phase 5 AFTER ~60 min of video generation. Fail in seconds instead.
          for var in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET REFRESH_TOKEN; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var missing — the video would fail at upload time. Set it in repo secrets."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] && echo "✓ YouTube OAuth secrets present"

          # Facebook is DISABLED by default (FB_UPLOAD_ENABLED=false) — only
          # warn (never fail) for FB secrets unless uploads are enabled.
          if [ "${FB_UPLOAD_ENABLED,,}" = "true" ]; then
            FB_PAGE="${FACEBOOK_PAGE_ID:-${FB_PAGE_ID_ALT:-}}"
            FB_TOKEN="${FACEBOOK_ACCESS_TOKEN:-${FB_ACCESS_TOKEN_ALT:-}}"
            if [ -z "$FB_PAGE" ] || [ -z "$FB_TOKEN" ]; then
              echo "::error::Facebook enabled but page id / access token missing."
              missing=1
            fi
          else
            echo "✓ Facebook disabled - FB secrets not required"
          fi
          exit "$missing"

      - name: Generate and upload Short
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # ---- US AUDIENCE ----
          TREND_REGION: "US"
          YOUTUBE_REGION_CODE: "US"
          CHANNEL_LANGUAGE: "en-US"
          CHANNEL_COUNTRY: "US"
          CONTENT_SERIES: "body_glitches"
          TOPIC_STRATEGY: "body_glitch_series"
          REQUIRE_DAILY_TREND: "false"
          # ---- Voice: American English (these envs are ACTUALLY read now) ----
          TTS_ENGINE: "kokoro"
          KOKORO_LANG_CODE: "a"
          KOKORO_VOICE: "am_adam"
          REQUIRE_CLONED_VOICE: "false"
          # ---- Image providers (optional keys; no-key providers always on) ----
          AI_HORDE_API_KEY: ${{ secrets.AI_HORDE_API_KEY }}
          AI_HORDE_MAX_WAIT: "300"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          DEEPAI_API_KEY: ${{ secrets.DEEPAI_API_KEY }}
          MODELSLAB_API_KEY: ${{ secrets.MODELSLAB_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # ---- YouTube OAuth ----
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          YT_MADE_FOR_KIDS: "false"
          YT_DECLARE_SYNTHETIC_MEDIA: "true"
          YT_PLAYLIST_ENABLED: "true"
          # Upload private + publishAt → YouTube auto-publishes at the next US
          # peak slot (06:00 / 12:30 / 20:00 NY). Videos sit privately first,
          # so anything broken can be deleted before it ever goes live.
          YT_PRIVACY_STATUS: "private"
          YT_SCHEDULE_PUBLISH: "true"
          # ---- Anti-spam ----
          ENFORCE_POSTING_GAP: "true"
          # ---- Facebook Reels (ON — secrets verified in repo) ----
          FB_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN || secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID || secrets.FB_PAGE_ID }}
          FB_UPLOAD_ENABLED: "true"
          # Reel publishes 2h after the YouTube slot (Meta same-day boost
          # fires in its own window); spoken CTA + caption auto-switch to the
          # FB-safe, engagement-bait-free variant when this is true.
          FB_STAGGER_MINUTES: "120"
          # ---- Quality gates ----
          TARGET_MIN_SECONDS: "40"
          TARGET_MAX_SECONDS: "55"
          CHATTERBOX_TEMPO: "0.96"
          CHATTERBOX_EXAGGERATION: "0.35"
          CHATTERBOX_CFG_WEIGHT: "0.70"
          CHATTERBOX_TEMPERATURE: "0.60"
          MUSIC_VOLUME: "0.07"
          ENABLE_SCREENSHOT_FALLBACK: "false"
          MIN_HOOK_SCORE: "85"
          QUALITY_APPROVAL_THRESHOLD: "85"
          MAX_HOOK_SECONDS: "5.0"
          FALLBACK_ABORT_RATIO: "0.80"
          VIDEO_TOPIC: ${{ inputs.topic || '' }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt / 3 ==="
            if python src/main.py; then
              break
            else
              rc=$?
              echo "::warning::Fail $attempt code $rc"
              if [ $attempt -eq 3 ]; then exit $rc; fi
              sleep $((attempt * 60))
            fi
          done

      - name: Persist durable channel state (with rebase retry)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- data/)" ]; then echo "No state changes."; exit 0; fi
          git config user.name "skillor-bot"
          git config user.email "skillor-bot@users.noreply.github.com"
          git add data/
          git commit -m "chore: persist SKILLOR channel state [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              break
            else
              echo "Push retry $i"
              sleep $((i*5))
              if [ $i -eq 3 ]; then
                # State stays in the run artifact below as a recovery copy —
                # data/ is uploaded alongside output/ and pipeline.log.
                echo "::warning::State push failed after 3 tries; recovery copy is in this run's artifact."
                exit 0
              fi
            fi
          done

      - name: Upload video, thumbnail, state backup and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skillor-run-${{ github.run_id }}
          path: |
            output/
            pipeline.log
            data/
          if-no-files-found: ignore
          retention-days: 14

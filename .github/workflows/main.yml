name: "SKILLOR - YouTube Shorts Automation"

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional video topic (empty = trending topic)"
        required: false
        type: string
  schedule:
    # GitHub cron uses UTC.
    - cron: "0 18 * * *"

permissions:
  contents: read

concurrency:
  group: skillor-video-generation
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            imagemagick \
            espeak-ng
          POLICY_FILE="$(find /etc/ImageMagick-6 -name policy.xml 2>/dev/null | head -n 1 || true)"
          if [ -n "$POLICY_FILE" ]; then
            sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' "$POLICY_FILE" || true
          fi
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Restore topic and upload history
        uses: actions/cache@v4
        with:
          path: output/video_history.json
          key: skillor-history-${{ github.run_id }}
          restore-keys: |
            skillor-history-

      - name: Validate required secrets
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::GROQ_API_KEY repository secret is missing."
            exit 1
          fi

      - name: Generate and upload Short
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional official trend APIs. Google Trends RSS still works when
          # these are empty; never fall back to brittle HTML scraping.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TREND_REGION: "US"
          YOUTUBE_REGION_CODE: "US"
          AI_HORDE_API_KEY: ${{ secrets.AI_HORDE_API_KEY }}
          AI_HORDE_MAX_WAIT: "300"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEEPAI_API_KEY: ${{ secrets.DEEPAI_API_KEY }}
          MODELSLAB_API_KEY: ${{ secrets.MODELSLAB_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          YT_MADE_FOR_KIDS: "false"
          FB_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          # OPTIMIZED FOR RETENTION & TRENDS
          TARGET_MIN_SECONDS: "20"
          TARGET_MAX_SECONDS: "35"
          # Natural, clear creator narration; slightly slower than the raw
          # model without the artificial dramatic pace.
          CHATTERBOX_TEMPO: "0.96"
          CHATTERBOX_EXAGGERATION: "0.35"
          CHATTERBOX_CFG_WEIGHT: "0.70"
          CHATTERBOX_TEMPERATURE: "0.60"
          REQUIRE_CLONED_VOICE: "true"
          MUSIC_VOLUME: "0.07"
          ENABLE_SCREENSHOT_FALLBACK: "false"
          MIN_HOOK_SCORE: "70"
          FALLBACK_ABORT_RATIO: "0.80"
          VIDEO_TOPIC: ${{ inputs.topic || '' }}
          IMAGEMAGICK_BINARY: /usr/bin/convert
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python src/main.py

      - name: Upload video, thumbnail and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skillor-run-${{ github.run_id }}
          path: |
            output/
            pipeline.log
          if-no-files-found: ignore
          retention-days: 7

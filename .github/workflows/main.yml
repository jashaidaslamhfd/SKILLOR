name: 🎬 USA Peak-Time YouTube Automation Pipeline (2026)

name: NeuroMystery Auto Upload

on:
  schedule:
    # USA Eastern Time: 9AM = 13:00 UTC, 3PM = 19:00 UTC, 8PM = 00:00 UTC next day
    - cron: '0 13 * * *'  # 9AM EST
    - cron: '0 19 * * *'  # 3PM EST
    - cron: '0 0 * * *'   # 8PM EST
  workflow_dispatch: # Manual run ka button bhi dega

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Python packages
        run: |
          pip install groq==0.9.0
          pip install google-auth==2.29.0 google-auth-oauthlib==1.2.0 google-api-python-client==2.126.0
          pip install requests==2.31.0
          pip install cloudinary==1.36.0
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install git+https://github.com/hexgrad/kokoro.git
      
      - name: Create output folders
        run: |
          mkdir -p output
          mkdir -p assets
          mkdir -p config
      
      - name: Run Step 1 - Generate Topic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python core/1_topic_gen.py
      
      - name: Run Step 2 - Script + Voice
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python core/2_script_voice.py
      
      - name: Run Step 3 - Assemble Video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python core/3_video_assemble.py
      
      - name: Run Step 4 - Upload to YouTube
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python core/4_uploader.py --platform youtube
      
      - name: Run Step 4 - Upload to Facebook
        env:
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: python core/4_uploader.py --platform facebook
      
      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: output/
          

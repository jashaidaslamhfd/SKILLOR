name: "SKILLOR - YouTube Shorts Automation"

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional video topic (empty = trending topic)"
        required: false
        type: string
  schedule:
    # Three USA peak-time triggers (EDT = UTC-4):
    # 12:00 PM EDT = 16:00 UTC  (lunch peak)
    # 3:00 PM EDT  = 19:00 UTC  (afternoon peak)
    # 7:00 PM EDT  = 23:00 UTC  (prime-time peak)
    # Gate below allows all three hours.
    - cron: "0 16,19,23 * * *"

permissions:
  # Required to persist durable topic/upload/analytics state in data/.
  contents: write

concurrency:
  group: skillor-video-generation
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Gate the run to USA peak hours
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ny_hour="$(TZ=America/New_York date +%H)"
          case "$ny_hour" in
            12|15|19) echo "should_run=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "should_run=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache TTS model downloads for CPU reliability
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: skillor-tts-models-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install system dependencies
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            imagemagick \
            espeak-ng
          POLICY_FILE="$(find /etc/ImageMagick-6 -name policy.xml 2>/dev/null | head -n 1 || true)"
          if [ -n "$POLICY_FILE" ]; then
            sudo sed -i 's/rights="none" pattern="@\\*"/rights="read|write" pattern="@*"/g' "$POLICY_FILE" || true
          fi
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Run offline quality regression tests
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          # Keep the 500-topic catalogue synchronized with its generator.
          # This prevents an old committed JSON catalogue from producing old
          # numbered titles after the title strategy changes.
          python scripts/generate_body_glitch_topics.py
          python -m compileall -q src scripts tests
          python -m unittest discover -s tests -v

      - name: Validate required secrets
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::GROQ_API_KEY repository secret is missing."
            exit 1
          fi
          echo "YouTube Data API and Reddit OAuth are optional trend-inspiration sources."

      - name: Generate and upload Short
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional official trend APIs. Google Trends RSS still works when
          # these are empty; never fall back to brittle HTML scraping.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TREND_REGION: "US"
          YOUTUBE_REGION_CODE: "US"
          AI_HORDE_API_KEY: ${{ secrets.AI_HORDE_API_KEY }}
          AI_HORDE_MAX_WAIT: "300"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEEPAI_API_KEY: ${{ secrets.DEEPAI_API_KEY }}
          MODELSLAB_API_KEY: ${{ secrets.MODELSLAB_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          YT_MADE_FOR_KIDS: "false"
          # CHANGED: Videos now upload as PUBLIC (was "private")
          YT_PRIVACY_STATUS: "public"
          # MrNextep 500-episode micro-niche launch: topic fit beats general news trends.
          CONTENT_SERIES: "body_glitches"
          TOPIC_STRATEGY: "body_glitch_series"
          REQUIRE_DAILY_TREND: "false"
          FB_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FB_UPLOAD_ENABLED: "true"
          # OPTIMIZED FOR RETENTION & TRENDS
          TARGET_MIN_SECONDS: "40"
          TARGET_MAX_SECONDS: "55"
          # Natural, clear creator narration; slightly slower than the raw
          # model without the artificial dramatic pace.
          CHATTERBOX_TEMPO: "0.96"
          CHATTERBOX_EXAGGERATION: "0.35"
          CHATTERBOX_CFG_WEIGHT: "0.70"
          CHATTERBOX_TEMPERATURE: "0.60"
          REQUIRE_CLONED_VOICE: "true"
          MUSIC_VOLUME: "0.07"
          ENABLE_SCREENSHOT_FALLBACK: "false"
          MIN_HOOK_SCORE: "85"
          QUALITY_APPROVAL_THRESHOLD: "85"
          MAX_HOOK_SECONDS: "5.0"
          FALLBACK_ABORT_RATIO: "0.80"
          VIDEO_TOPIC: ${{ inputs.topic || '' }}
          IMAGEMAGICK_BINARY: /usr/bin/convert
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python src/main.py

      - name: Persist durable channel state
        if: always() && steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- data/)" ]; then
            echo "No state changes to persist."
            exit 0
          fi
          git config user.name "skillor-bot"
          git config user.email "skillor-bot@users.noreply.github.com"
          git add data/
          git commit -m "chore: persist SKILLOR channel state [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload video, thumbnail and logs
        if: always() && steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: skillor-run-${{ github.run_id }}
          path: |
            output/
            pipeline.log
          if-no-files-found: ignore
          retention-days: 7
